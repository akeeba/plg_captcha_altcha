PLG_CAPTCHA_ALTCHA="CAPTCHA - ALTCHA"
PLG_CAPTCHA_ALTCHA_XML_DESCRIPTION="Implémente l'alternative open source, auto-hébergée, basée sur la preuve de travail <a href=\"https://altcha.org\" target=\"_blank\">ALTCHA</a> aux CAPTCHA. Vos utilisateurs n'ont pas à résoudre des puzzles ou lire des lettres déformées. Ils cochent simplement une case. Entièrement conforme au RGPD, et auto-hébergé."

; Options du plugin - Basique
PLG_CAPTCHA_ALTCHA_MADE_IN_EU="🇪🇺 Fabriqué dans l'Union européenne"
PLG_CAPTCHA_ALTCHA_MADE_IN_EU_INFO="ALTCHA lui-même, ainsi que ce plugin qui l'implémente dans Joomla!, sont fabriqués dans l'Union européenne où la vie privée compte – par principe et en vertu de la <em>loi</em>. L'ALTCHA auto-hébergé implémenté par ce plugin est entièrement conforme au RGPD et n'utilise aucun cookie. Aucune déclaration de confidentialité ni bannière de cookies n'est requise sur votre site."

PLG_CAPTCHA_ALTCHA_FIELD_AUTO_LABEL="Mode automatique"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_DESC="Démarre automatiquement la vérification sans interaction de l'utilisateur. L'utilisation d'une valeur autre que Désactivé est recommandée pour la conformité WCAG 2.2 comme expliqué dans <a href=\"https://altcha.org/docs/wcag/\" target=\"_blank\">la documentation d'ALTCHA</a>."
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_OFF="Désactivé"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONFOCUS="Quand le champ CAPTCHA reçoit le focus (onfocus)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONLOAD="Au chargement de la page (onload)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONSUBMIT="Lors de la soumission du formulaire (onsubmit)"

PLG_CAPTCHA_ALTCHA_FIELD_HASH_LABEL="Algorithme de hachage"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_DESC="L'algorithme de hachage à utiliser pour la preuve de travail. SHA-512 nécessite beaucoup plus d'effort de calcul que SHA-1, rendant le CAPTCHA plus difficile à contourner."
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA1="SHA-1"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA256="SHA-256"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA512="SHA-512"

PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_LABEL="Nombre maximal"
PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_DESC="La preuve de travail itère les nombres entre 1 et ce nombre. Plus ce nombre est élevé, plus le CAPTCHA est robuste, mais plus il faut de temps pour le résoudre sur des appareils moins puissants (par exemple, des smartphones datant de plusieurs années). Par défaut : 50000. Recommandé pour un CAPTCHA robuste : 1000000. Plage de valeurs : 1000 à 1000000."

PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_LABEL="Longueur du sel"
PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_DESC="La longueur des données aléatoires utilisées pour le défi CAPTCHA. Plus elle est longue, plus la résolution du CAPTCHA est lente. Par défaut : 16. Plage : 12 à 64."

PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_LABEL="Expiration"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_DESC="Durée de validité du CAPTCHA. Plus elle est courte, mieux c'est pour la sécurité du formulaire, mais des valeurs trop courtes peuvent provoquer des erreurs CAPTCHA sur des connexions ou des appareils plus lents. Des valeurs inférieures à 30 secondes peuvent être impraticables. Notez qu'un ALTCHA déjà résolu sur la page se rafraîchira et se résoudra à nouveau juste avant son expiration. Par défaut : 2 minutes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10S="10 secondes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30S="30 secondes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1M="1 minute"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2M="2 minutes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10M="10 minutes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30M="30 minutes"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1H="1 heure"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2H="2 heures"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT6H="6 heures"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT12H="12 heures"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_P1D="1 jour"

PLG_CAPTCHA_ALTCHA_FIELD_DELAY_LABEL="Délai (ms)"
PLG_CAPTCHA_ALTCHA_FIELD_DELAY_DESC="Ajoute un délai artificiel avant de démarrer l'algorithme de preuve de travail. Par défaut : 0. Plage : 0 à 10000 (en millisecondes, soit 0 à 10 secondes)."

PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_LABEL="Masquer le pied de page"
PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_DESC="Masquer le pied de page (lien ALTCHA)"

PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_LABEL="Masquer le logo"
PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_DESC="Masquer le logo ALTCHA"

; Options du plugin - personnalisation
COM_PLUGINS_CUSTOMISE_FIELDSET_LABEL="Personnalisation"

PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_LABEL="Personnaliser l'apparence"
PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DESC="Appliquer des <a href=\"https://altcha.org/docs/widget-customization/#appearance\" target=\"_blank\">variables CSS personnalisées</a> pour modifier l'apparence de l'interface."

PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_LABEL="Largeur de bordure"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_DESC="L'épaisseur de la bordure entourant le contrôle. Saisissez une valeur avec unités. Par défaut : <code>1px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_LABEL="Rayon de bordure"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_DESC="Le rayon des coins arrondis de la bordure. Saisissez une valeur avec unités. Utilisez <code>0</code> pour des coins carrés. Par défaut : <code>3px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_LABEL="Largeur maximale"
PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_DESC="La largeur maximale du contrôle. Saisissez une valeur avec unités. Par défaut : <code>260px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_LABEL="Couleur d'arrière-plan"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_DESC="La couleur d'arrière-plan du contrôle."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_LABEL="Couleur de bordure"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_DESC="La couleur de la bordure entourant le contrôle."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL="Couleur du texte"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL_DESC="La couleur du texte à l'intérieur du contrôle."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_LABEL="Couleur de bordure au focus"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_DESC="La couleur de la bordure entourant le contrôle, lorsque le contrôle est focalisé."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_LABEL="Couleur du texte d'erreur"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_DESC="La couleur du texte à l'intérieur du contrôle indiquant qu'une erreur s'est produite."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_LABEL="Arrière-plan du pied de page"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_DESC="La couleur d'arrière-plan du pied de page du contrôle, où le texte \"Protégé par\" est affiché."

PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_LABEL="Personnaliser les couleurs du mode sombre"
PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_DESC="Appliquer des <a href=\"https://altcha.org/docs/widget-customization/#appearance\" target=\"_blank\">variables CSS personnalisées</a> pour modifier les couleurs de l'interface <em>lorsque le site est affiché en <a href=\"https://webkit.org/blog/8840/dark-mode-support-in-webkit/\" target=\"_blank\">mode sombre</a></em>."

PLG_CAPTCHA_ALTCHA_CUSTOMISE_LANGUAGE_HEAD="🌍 Personnalisation de la langue"
PLG_CAPTCHA_ALTCHA_CUSTOMISE_LANGUAGE_INFO="<p>Vous pouvez personnaliser et/ou traduire les termes utilisés dans votre contrôle ALTCHA en <a href=\"index.php?option=com_languages&view=overrides\" target=\"_blank\">créant des remplacements de langue</a> pour les chaînes de langue suivantes :</p><ul><li><code>PLG_CAPTCHA_ALTCHA_ARIALINKLABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_ERROR</code></li><li><code>PLG_CAPTCHA_ALTCHA_EXPIRED</code></li><li><code>PLG_CAPTCHA_ALTCHA_FOOTER</code></li><li><code>PLG_CAPTCHA_ALTCHA_LABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFIED</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFYING</code></li><li><code>PLG_CAPTCHA_ALTCHA_WAITALERT</code></li></ul>"

