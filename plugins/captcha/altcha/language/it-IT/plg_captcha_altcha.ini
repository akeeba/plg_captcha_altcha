PLG_CAPTCHA_ALTCHA="CAPTCHA - ALTCHA"
PLG_CAPTCHA_ALTCHA_XML_DESCRIPTION="Implementa l'alternativa open source, self-hosted e basata su proof-of-work <a href=\"https://altcha.org\" target=\"_blank\">ALTCHA</a> ai CAPTCHA. I vostri utenti non devono risolvere puzzle o leggere lettere distorte. Devono solo fare clic su una casella di controllo. Completamente conforme al GDPR e self-hosted."

; Opzioni del plugin - Base
PLG_CAPTCHA_ALTCHA_MADE_IN_EU="🇪🇺 Prodotto nell'Unione Europea"
PLG_CAPTCHA_ALTCHA_MADE_IN_EU_INFO="ALTCHA stesso, così come questo plugin che lo implementa in Joomla!, sono prodotti nell'Unione Europea dove la privacy è importante – come questione di principio e di <em>legge</em>. L'ALTCHA self-hosted implementato da questo plugin è completamente conforme al GDPR e non utilizza cookie. Sul vostro sito non è richiesta alcuna informativa sulla privacy né banner sui cookie."

PLG_CAPTCHA_ALTCHA_FIELD_AUTO_LABEL="Modalità automatica"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_DESC="Avvia automaticamente la verifica senza l'interazione dell'utente. Si consiglia di utilizzare un valore diverso da Disattivato per la conformità WCAG 2.2 come spiegato nella <a href=\"https://altcha.org/docs/wcag/\" target=\"_blank\">documentazione di ALTCHA</a>."
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_OFF="Disattivato"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONFOCUS="Quando il campo CAPTCHA riceve il focus (onfocus)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONLOAD="Quando la pagina viene caricata (onload)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONSUBMIT="Quando il modulo viene inviato (onsubmit)"

PLG_CAPTCHA_ALTCHA_FIELD_HASH_LABEL="Algoritmo di hash"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_DESC="L'algoritmo di hash da utilizzare per il proof-of-work. SHA-512 richiede molto più sforzo computazionale di SHA-1, rendendo il CAPTCHA più difficile da aggirare."
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA1="SHA-1"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA256="SHA-256"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA512="SHA-512"

PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_LABEL="Numero massimo"
PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_DESC="Il proof-of-work itera i numeri tra 1 e questo numero. Più alto è questo numero, più forte è il CAPTCHA, ma più tempo ci vuole per risolverlo su dispositivi meno potenti (ad esempio, smartphone di diversi anni fa). Predefinito: 50000. Consigliato per un CAPTCHA robusto: 1000000. Intervallo di valori: da 1000 a 1000000."

PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_LABEL="Lunghezza del salt"
PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_DESC="La lunghezza dei dati casuali utilizzati per la sfida CAPTCHA. Più è lunga, più lenta diventa la risoluzione del CAPTCHA. Predefinito: 16. Intervallo: da 12 a 64."

PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_LABEL="Scadenza"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_DESC="Per quanto tempo il CAPTCHA è valido. Più breve è, meglio è per la sicurezza del modulo, ma ricordate che valori troppo brevi possono causare errori CAPTCHA su connessioni o dispositivi più lenti. I valori inferiori a 30 secondi possono essere poco pratici. Si noti che un ALTCHA già risolto sulla pagina si aggiornerà e si risolverà nuovamente appena prima della scadenza. Predefinito: 2 minuti"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10S="10 secondi"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30S="30 secondi"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1M="1 minuto"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2M="2 minuti"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10M="10 minuti"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30M="30 minuti"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1H="1 ora"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2H="2 ore"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT6H="6 ore"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT12H="12 ore"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_P1D="1 giorno"

PLG_CAPTCHA_ALTCHA_FIELD_DELAY_LABEL="Ritardo (ms)"
PLG_CAPTCHA_ALTCHA_FIELD_DELAY_DESC="Aggiunge un ritardo artificiale prima di avviare l'algoritmo proof-of-work. Predefinito: 0. Intervallo: da 0 a 10000 (in millisecondi, ovvero da 0 a 10 secondi)."

PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_LABEL="Nascondi piè di pagina"
PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_DESC="Nasconde il piè di pagina (collegamento ALTCHA)"

PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_LABEL="Nascondi logo"
PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_DESC="Nasconde il logo ALTCHA"

