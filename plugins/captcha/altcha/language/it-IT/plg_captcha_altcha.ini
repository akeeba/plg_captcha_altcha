PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_LABEL="Spessore del bordo"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_DESC="Lo spessore del bordo che circonda il controllo. Inserire un valore con unità. Predefinito: <code>1px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_LABEL="Raggio del bordo"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_DESC="Il raggio degli angoli arrotondati del bordo. Inserire un valore con unità. Usare <code>0</code> per angoli squadrati. Predefinito: <code>3px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_LABEL="Larghezza massima"
PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_DESC="La larghezza massima del controllo. Inserire un valore con unità. Predefinito: <code>260px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_LABEL="Colore di sfondo"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_DESC="Il colore di sfondo del controllo."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_LABEL="Colore del bordo"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_DESC="Il colore del bordo che circonda il controllo."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL="Colore del testo"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL_DESC="Il colore del testo all'interno del controllo."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_LABEL="Colore del bordo con focus"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_DESC="Il colore del bordo che circonda il controllo, quando il controllo è a fuoco."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_LABEL="Colore del testo di errore"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_DESC="Il colore del testo all'interno del controllo che indica che si è verificato un errore."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_LABEL="Sfondo del piè di pagina"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_DESC="Il colore di sfondo del piè di pagina del controllo, dove viene mostrato il testo \"Protetto da\"."

PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_LABEL="Personalizza colori modalità scura"
PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_DESC="Applica <a href=\"https://altcha.org/docs/widget-customization/#appearance\" target=\"_blank\">variabili CSS personalizzate</a> per modificare i colori dell'interfaccia <em>quando il sito viene visualizzato in <a href=\"https://webkit.org/blog/8840/dark-mode-support-in-webkit/\" target=\"_blank\">modalità scura</a></em>."

PLG_CAPTCHA_ALTCHA_CUSTOMISE_LANGUAGE_HEAD="🌍 Personalizzazione della lingua"
PLG_CAPTCHA_ALTCHA_CUSTOMISE_LANGUAGE_INFO="<p>Puoi personalizzare e/o tradurre le parole utilizzate nel tuo controllo ALTCHA <a href=\"index.php?option=com_languages&view=overrides\" target=\"_blank\">creando sostituzioni di lingua</a> per le seguenti stringhe di lingua:</p><ul><li><code>PLG_CAPTCHA_ALTCHA_ARIALINKLABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_ERROR</code></li><li><code>PLG_CAPTCHA_ALTCHA_EXPIRED</code></li><li><code>PLG_CAPTCHA_ALTCHA_FOOTER</code></li><li><code>PLG_CAPTCHA_ALTCHA_LABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFIED</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFYING</code></li><li><code>PLG_CAPTCHA_ALTCHA_WAITALERT</code></li></ul>"

