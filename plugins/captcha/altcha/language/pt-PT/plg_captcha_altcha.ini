PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL_DESC="A cor do texto dentro do controlo."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_LABEL="Cor da borda com foco"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_DESC="A cor da borda que rodeia o controlo, quando o controlo está em foco."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_LABEL="Cor do texto de erro"
