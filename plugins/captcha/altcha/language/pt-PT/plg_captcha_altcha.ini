PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_LABEL="Raio da borda"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_DESC="O raio dos cantos arredondados da borda. Introduza um valor com unidades. Use <code>0</code> para cantos quadrados. Predefinição: <code>3px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_LABEL="Largura máxima"
PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_DESC="A largura máxima do controlo. Introduza um valor com unidades. Predefinição: <code>260px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_LABEL="Cor de fundo"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_DESC="A cor de fundo do controlo."

