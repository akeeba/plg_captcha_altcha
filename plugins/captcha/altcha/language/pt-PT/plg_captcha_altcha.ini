PLG_CAPTCHA_ALTCHA="CAPTCHA - ALTCHA"
PLG_CAPTCHA_ALTCHA_XML_DESCRIPTION="Implementa a alternativa de código aberto, auto-hospedada e baseada em prova de trabalho <a href=\"https://altcha.org\" target=\"_blank\">ALTCHA</a> aos CAPTCHA. Os seus utilizadores não têm de resolver puzzles ou ler letras distorcidas. Apenas têm de clicar numa caixa de verificação. Totalmente compatível com o RGPD e auto-hospedado."

; Opções do plugin - Básico
PLG_CAPTCHA_ALTCHA_MADE_IN_EU="🇪🇺 Fabricado na União Europeia"
PLG_CAPTCHA_ALTCHA_MADE_IN_EU_INFO="O próprio ALTCHA, bem como este plugin que o implementa no Joomla!, são fabricados na União Europeia onde a privacidade importa – por princípio e por <em>lei</em>. O ALTCHA auto-hospedado implementado por este plugin é totalmente compatível com o RGPD e não utiliza cookies. Não é necessário qualquer aviso de privacidade ou banner de cookies no seu site."

PLG_CAPTCHA_ALTCHA_FIELD_AUTO_LABEL="Modo automático"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_DESC="Inicia automaticamente a verificação sem interação do utilizador. Recomenda-se utilizar um valor diferente de Desativado para a conformidade com WCAG 2.2 conforme explicado na <a href=\"https://altcha.org/docs/wcag/\" target=\"_blank\">documentação do ALTCHA</a>."
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_OFF="Desativado"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONFOCUS="Quando o campo CAPTCHA recebe o foco (onfocus)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONLOAD="Quando a página é carregada (onload)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONSUBMIT="Quando o formulário é submetido (onsubmit)"

PLG_CAPTCHA_ALTCHA_FIELD_HASH_LABEL="Algoritmo de hash"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_DESC="O algoritmo de hash a ser utilizado para a prova de trabalho. SHA-512 requer muito mais esforço de cálculo do que SHA-1, tornando o CAPTCHA mais difícil de contornar."
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA1="SHA-1"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA256="SHA-256"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA512="SHA-512"

PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_LABEL="Número máximo"
PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_DESC="A prova de trabalho itera números entre 1 e este número. Quanto maior for este número, mais forte é o CAPTCHA, mas mais tempo demora a resolver em dispositivos menos potentes (por exemplo, smartphones de há vários anos). Predefinição: 50000. Recomendado para um CAPTCHA robusto: 1000000. Intervalo de valores: 1000 a 1000000."

PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_LABEL="Comprimento do salt"
PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_DESC="O comprimento dos dados aleatórios utilizados para o desafio CAPTCHA. Quanto mais longo, mais lento se torna a resolução do CAPTCHA. Predefinição: 16. Intervalo: 12 a 64."

PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_LABEL="Expiração"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_DESC="Durante quanto tempo o CAPTCHA é válido. Quanto mais curto, melhor para a segurança do formulário, mas lembre-se que valores demasiado curtos podem causar erros de CAPTCHA em ligações ou dispositivos mais lentos. Valores abaixo de 30 segundos podem ser impráticos. Note que um ALTCHA já resolvido na página irá atualizar-se e resolver-se novamente mesmo antes de expirar. Predefinição: 2 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10S="10 segundos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30S="30 segundos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1M="1 minuto"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2M="2 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10M="10 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30M="30 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1H="1 hora"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2H="2 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT6H="6 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT12H="12 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_P1D="1 dia"

PLG_CAPTCHA_ALTCHA_FIELD_DELAY_LABEL="Atraso (ms)"
PLG_CAPTCHA_ALTCHA_FIELD_DELAY_DESC="Adiciona um atraso artificial antes de iniciar o algoritmo de prova de trabalho. Predefinição: 0. Intervalo: 0 a 10000 (em milissegundos, ou seja, 0 a 10 segundos)."

PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_LABEL="Ocultar rodapé"
PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_DESC="Ocultar o rodapé (ligação ALTCHA)"

PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_LABEL="Ocultar logótipo"
PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_DESC="Ocultar o logótipo ALTCHA"

