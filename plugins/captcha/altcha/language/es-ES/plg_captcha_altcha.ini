PLG_CAPTCHA_ALTCHA_CUSTOMISE_LANGUAGE_INFO="<p>Puede personalizar y/o traducir los términos utilizados en su control ALTCHA <a href=\"index.php?option=com_languages&view=overrides\" target=\"_blank\">creando anulaciones de idioma</a> para las siguientes cadenas de idioma:</p><ul><li><code>PLG_CAPTCHA_ALTCHA_ARIALINKLABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_ERROR</code></li><li><code>PLG_CAPTCHA_ALTCHA_EXPIRED</code></li><li><code>PLG_CAPTCHA_ALTCHA_FOOTER</code></li><li><code>PLG_CAPTCHA_ALTCHA_LABEL</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFIED</code></li><li><code>PLG_CAPTCHA_ALTCHA_VERIFYING</code></li><li><code>PLG_CAPTCHA_ALTCHA_WAITALERT</code></li></ul>"

