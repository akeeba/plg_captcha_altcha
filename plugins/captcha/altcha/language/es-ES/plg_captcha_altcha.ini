PLG_CAPTCHA_ALTCHA="CAPTCHA - ALTCHA"
PLG_CAPTCHA_ALTCHA_XML_DESCRIPTION="Implementa la alternativa de código abierto, autoalojada y basada en prueba de trabajo <a href=\"https://altcha.org\" target=\"_blank\">ALTCHA</a> a los CAPTCHA. Sus usuarios no tienen que resolver puzzles ni leer letras distorsionadas. Solo tienen que marcar una casilla. Totalmente compatible con el RGPD y autoalojado."

; Opciones del plugin - Básico
PLG_CAPTCHA_ALTCHA_MADE_IN_EU="🇪🇺 Hecho en la Unión Europea"
PLG_CAPTCHA_ALTCHA_MADE_IN_EU_INFO="El propio ALTCHA, así como este plugin que lo implementa en Joomla!, están hechos en la Unión Europea donde la privacidad importa – como cuestión de principio y de <em>ley</em>. El ALTCHA autoalojado implementado por este plugin es totalmente compatible con el RGPD y no utiliza cookies. No se requiere ningún aviso de privacidad ni banner de cookies en su sitio."

PLG_CAPTCHA_ALTCHA_FIELD_AUTO_LABEL="Modo automático"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_DESC="Inicia automáticamente la verificación sin interacción del usuario. Se recomienda utilizar un valor distinto de Desactivado para el cumplimiento de WCAG 2.2 como se explica en <a href=\"https://altcha.org/docs/wcag/\" target=\"_blank\">la documentación de ALTCHA</a>."
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_OFF="Desactivado"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONFOCUS="Cuando el campo CAPTCHA recibe el foco (onfocus)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONLOAD="Cuando se carga la página (onload)"
PLG_CAPTCHA_ALTCHA_FIELD_AUTO_OPT_ONSUBMIT="Cuando se envía el formulario (onsubmit)"

PLG_CAPTCHA_ALTCHA_FIELD_HASH_LABEL="Algoritmo de hash"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_DESC="El algoritmo de hash que se utilizará para la prueba de trabajo. SHA-512 requiere mucho más esfuerzo de cómputo que SHA-1, lo que hace que el CAPTCHA sea más difícil de eludir."
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA1="SHA-1"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA256="SHA-256"
PLG_CAPTCHA_ALTCHA_FIELD_HASH_OPT_SHA512="SHA-512"

PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_LABEL="Número máximo"
PLG_CAPTCHA_ALTCHA_FIELD_MAXNUMBER_DESC="La prueba de trabajo itera números entre 1 y este número. Cuanto mayor sea este número, más fuerte será el CAPTCHA, pero más tiempo tardará en resolverse en dispositivos menos potentes (por ejemplo, smartphones de hace varios años). Por defecto: 50000. Recomendado para un CAPTCHA fuerte: 1000000. Rango de valores: 1000 a 1000000."

PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_LABEL="Longitud del salt"
PLG_CAPTCHA_ALTCHA_FIELD_SALTLENGTH_DESC="La longitud de los datos aleatorios utilizados para el desafío CAPTCHA. Cuanto mayor sea, más lento se vuelve resolver el CAPTCHA. Por defecto: 16. Rango: 12 a 64."

PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_LABEL="Expiración"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_DESC="Durante cuánto tiempo es válido el CAPTCHA. Cuanto más corto, mejor para la seguridad del formulario, pero recuerde que los valores demasiado cortos pueden causar errores de CAPTCHA en conexiones o dispositivos más lentos. Los valores por debajo de 30 segundos pueden ser poco prácticos. Tenga en cuenta que un ALTCHA ya resuelto en la página se actualizará y se resolverá de nuevo justo antes de que expire. Por defecto: 2 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10S="10 segundos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30S="30 segundos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1M="1 minuto"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2M="2 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT10M="10 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT30M="30 minutos"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT1H="1 hora"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT2H="2 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT6H="6 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_PT12H="12 horas"
PLG_CAPTCHA_ALTCHA_FIELD_EXPIRES_OPT_P1D="1 día"

PLG_CAPTCHA_ALTCHA_FIELD_DELAY_LABEL="Retraso (ms)"
PLG_CAPTCHA_ALTCHA_FIELD_DELAY_DESC="Añade un retraso artificial antes de iniciar el algoritmo de prueba de trabajo. Por defecto: 0. Rango: 0 a 10000 (en milisegundos, es decir, 0 a 10 segundos)."

PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_LABEL="Ocultar pie de página"
PLG_CAPTCHA_ALTCHA_FIELD_HIDEFOOTER_DESC="Ocultar el pie de página (enlace ALTCHA)"

PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_LABEL="Ocultar logo"
PLG_CAPTCHA_ALTCHA_FIELD_HIDELOGO_DESC="Ocultar el logo de ALTCHA"

