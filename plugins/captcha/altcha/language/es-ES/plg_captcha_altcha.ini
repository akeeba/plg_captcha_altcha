PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_LABEL="Ancho del borde"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_WIDTH_DESC="El grosor del borde que rodea el control. Introduzca un valor con unidades. Por defecto: <code>1px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_LABEL="Radio del borde"
PLG_CAPTCHA_ALTCHA_FIELD_BORDER_RADIUS_DESC="El radio de las esquinas redondeadas del borde. Introduzca un valor con unidades. Use <code>0</code> para esquinas cuadradas. Por defecto: <code>3px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_LABEL="Ancho máximo"
PLG_CAPTCHA_ALTCHA_FIELD_MAX_WIDTH_DESC="El ancho máximo del control. Introduzca un valor con unidades. Por defecto: <code>260px</code>"

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_LABEL="Color de fondo"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BASE_DESC="El color de fondo del control."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_LABEL="Color del borde"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_DESC="El color del borde que rodea el control."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL="Color del texto"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_TEXT_LABEL_DESC="El color del texto dentro del control."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_LABEL="Color del borde al enfocar"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_BORDER_FOCUS_DESC="El color del borde que rodea el control, cuando el control está enfocado."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_LABEL="Color del texto de error"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_ERROR_TEXT_DESC="El color del texto dentro del control que indica que se ha producido un error."

PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_LABEL="Fondo del pie de página"
PLG_CAPTCHA_ALTCHA_FIELD_COLOR_FOOTER_BG_DESC="El color de fondo del pie de página del control, donde se muestra el texto \"Protegido por\"."

PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_LABEL="Personalizar colores del modo oscuro"
PLG_CAPTCHA_ALTCHA_FIELD_CUSTOM_CSS_DARK_DESC="Aplique <a href=\"https://altcha.org/docs/widget-customization/#appearance\" target=\"_blank\">variables CSS personalizadas</a> para cambiar los colores de la interfaz <em>cuando el sitio se muestra en <a href=\"https://webkit.org/blog/8840/dark-mode-support-in-webkit/\" target=\"_blank\">modo oscuro</a></em>."

